<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servizio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Servizio</h1>
      <p class="subtitle">Timbratura, timer e modulo operativo</p>
    </div>
  </header>

  <nav class="main-nav">
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="archivio.html" class="nav-link">Archivio</a>
    <a href="servizio.html" class="nav-link active">Servizio</a>
    <a href="ronda.html" class="nav-link">Ronda Eagle</a>
    <a href="targhe.html" class="nav-link">Targhe</a>
  </nav>

  <main class="page-container narrow-page">
    <section class="panel">
      <h2>Stato di Servizio</h2>

      <div class="info-grid">
        <div class="info-box">
          <span class="info-label">Stato</span>
          <strong id="serviceStatus">Fuori servizio</strong>
        </div>

        <div class="info-box">
          <span class="info-label">Entrata</span>
          <strong id="serviceStartText">--:--:--</strong>
        </div>

        <div class="info-box">
          <span class="info-label">Uscita</span>
          <strong id="serviceEndText">--:--:--</strong>
        </div>

        <div class="info-box">
          <span class="info-label">Tempo in servizio</span>
          <strong id="serviceTimer">00:00:00</strong>
        </div>
      </div>

      <div class="button-row">
        <button class="btn btn-success" id="clockInBtn">Timbra Entrata</button>
        <button class="btn btn-warning" id="clockOutBtn">Timbra Uscita</button>
        <button class="btn btn-secondary" id="copyShiftModuleBtn">Copia Modulo</button>
      </div>
    </section>

    <section class="panel">
      <h2>Modulo Operativo</h2>

      <div class="form-grid">
        <div>
          <label>Nome in Codice</label>
          <input type="text" id="serviceCodename" value="<@1084580275582931044>" />
        </div>

        <div>
          <label>Ghetti attivi</label>
          <input type="text" id="serviceGhetti" placeholder="//" />
        </div>
      </div>

      <div class="stack">
        <div>
          <label>Rapporto</label>
          <textarea id="serviceRapporto" rows="5" placeholder="Scrivi qui il rapporto..."></textarea>
        </div>

        <div>
          <label>Informazioni</label>
          <textarea id="serviceInformazioni" rows="4" placeholder="//"></textarea>
        </div>
      </div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/servizio.js"></script>
</body>
</html>
